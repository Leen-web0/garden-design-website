<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		body{
			background-color: #f2f2f2;
		}
		form{
			font-family:'poppins';
			background-color: #c8d2c9;
			width: 30%;
			margin: 10% 30%;
			padding: 3% 6%;
			box-shadow: 3px 3px 3px 3px #000000;
		}
		hr{
			border: 3px solid #f2f2f2;
		}
		h2{
			text-align-last: center;
		}
		#username, #password{
			width: 100%;
			height: 2em;
			margin-bottom: 2%;
		}
		#for{
			float: right;
			margin-top: 3%;
		}
		#checkbox{
			margin-top: 3%;
		}
		#login{
			background-color: #f2f2f2;
			width: 100%;
			padding: 10px;
			border-radius: 20px;
			box-shadow: 3px 3px 3px #000000;

		}
		input{
			border-radius: 10px;
		}


	</style>
</head>
<body>
	<form>
			<h2>login</h2>
			<hr>
		</div>
		<div>
			<label>user name</label>
			<input type="email" name="username" id="username" placeholder="enter username">
			<br>
			<br>
			<label>password</label>
			<input type="password" name="password" id="password" placeholder="password">
			<br>
			<button name="login" id="login">login</button>
			<a id="for" href="forgot.html">Forgot password?</a>
			<br>
			<input type="checkbox" name="checkbox" id="checkbox">
			<label>Remember me</label>
		</div>
		<br>
		<div>
			<p>Don’t have an account?<a href="signup.html">Create an account</a></p>
			
		</div>

	</form>
</body>
</html>
